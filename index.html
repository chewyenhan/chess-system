<!DOCTYPE html>
<html lang="zh" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>学校国际象棋比赛系统</title>
  <link rel="stylesheet" href="css/pico.min.css">
  <style>
    :root {
      --pico-primary: #1a56db;
      --pico-primary-background: #1a56db;
      --pico-primary-hover: #1e40af;
      --pico-primary-hover-background: #1e40af;
    }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(135deg, #f0f4ff 0%, #e8f0fe 50%, #f8fafc 100%);
    }
    main {
      flex: 1;
      padding: 2rem 0;
    }
    .hero {
      text-align: center;
      padding: 3rem 1rem 2rem;
    }
    .hero h1 { font-size: 2.2rem; margin-bottom: 0.5rem; }
    .hero p { color: var(--pico-muted-color); font-size: 1.1rem; }
    .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; max-width: 800px; margin: 0 auto; }
    @media (max-width: 700px) { .card-grid { grid-template-columns: 1fr; } }
    .card-grid article header { text-align: center; }
    .card-grid article h3 { margin-bottom: 0.3rem; }
    .saved-list { margin-top: 1rem; }
    .saved-item { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 0; border-bottom: 1px solid var(--pico-muted-border-color); }
    .saved-item:last-child { border-bottom: none; }
    .saved-item a { text-decoration: none; font-weight: 500; }
    .badge { font-size: 0.75rem; padding: 0.15rem 0.5rem; border-radius: 1rem; background: var(--pico-primary-background); color: white; }
    textarea { font-family: monospace; font-size: 0.9rem; }
    .site-footer { text-align: center; padding: 1rem; font-size: 0.8rem; color: var(--pico-muted-color); }
    /* 破同分规则按钮 */
    fieldset legend {
      display: none; /* 隐藏 legend 文本 */
    }
    fieldset label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.3rem;
      cursor: pointer;
    }
    fieldset label input[type="checkbox"] {
      margin: 0;
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="hero">
      <h1>♟️ 学校国际象棋比赛系统</h1>
      <p>瑞士制自动配对 · 实时积分榜 · 手机看板</p>
    </div>

    <div class="card-grid">
      <!-- 左侧：创建新比赛 -->
      <article>
        <header><h3>🆕 创建新比赛</h3>
        <p style="color:var(--pico-muted-color);">输入比赛名称和轮次即可开始</p></header>
        <form id="createForm" onsubmit="handleCreate(event)">
          <label for="tName">比赛名称</label>
          <input type="text" id="tName" placeholder="例：初一国际象棋锦标赛" required>
          <label for="tRounds" style="margin-top:1rem;">总轮次</label>
          <select id="tRounds">
            <option value="3">3 轮（适合4-8人）</option>
            <option value="5" selected>5 轮（推荐，适合8-16人）</option>
            <option value="7">7 轮（适合16-32人）</option>
            <option value="9">9 轮（适合32人以上）</option>
          </select>
          <label for="playerInput" style="margin-top:1rem;">👥 参赛选手名单</label>
          <textarea id="playerInput" rows="5" placeholder="每行一位：姓名 或 姓名,年级&#10;例：&#10;张三,初一&#10;李四,初二&#10;王五&#10;赵六,初三"></textarea>
          <small style="color:var(--pico-muted-color);">可留空，稍后在管理页导入。已有人数：<strong id="playerCountPreview">0</strong></small>
          <label style="margin-top:1rem;">🏅 破同分规则（按优先级排序）</label>
          <fieldset style="margin-bottom:0;">
            <label>
              <input type="checkbox" id="tbBuchholz" checked>
              <span style="font-weight:bold; margin-left:0.3rem;">①</span>
              对手分 (Buchholz) — 所有对手的积分之和
              <button type="button" onclick="moveTieBreaker('tbBuchholz', -1)" class="outline secondary" style="font-size:0.7rem; padding:0.1rem 0.4rem;">↑</button>
              <button type="button" onclick="moveTieBreaker('tbBuchholz', 1)" class="outline secondary" style="font-size:0.7rem; padding:0.1rem 0.4rem;">↓</button>
            </label>
            <label>
              <input type="checkbox" id="tbMedian" checked>
              <span style="font-weight:bold; margin-left:0.3rem;">②</span>
              中间对手分 (Median Buchholz) — 去掉最高最低对手分
              <button type="button" onclick="moveTieBreaker('tbMedian', -1)" class="outline secondary" style="font-size:0.7rem; padding:0.1rem 0.4rem;">↑</button>
              <button type="button" onclick="moveTieBreaker('tbMedian', 1)" class="outline secondary" style="font-size:0.7rem; padding:0.1rem 0.4rem;">↓</button>
            </label>
            <label>
              <input type="checkbox" id="tbDirect">
              <span style="font-weight:bold; margin-left:0.3rem;">③</span>
              直胜 (Direct Encounter) — 相互对局结果
              <button type="button" onclick="moveTieBreaker('tbDirect', -1)" class="outline secondary" style="font-size:0.7rem; padding:0.1rem 0.4rem;">↑</button>
              <button type="button" onclick="moveTieBreaker('tbDirect', 1)" class="outline secondary" style="font-size:0.7rem; padding:0.1rem 0.4rem;">↓</button>
            </label>
            <label>
              <input type="checkbox" id="tbSonneborn">
              <span style="font-weight:bold; margin-left:0.3rem;">④</span>
              索尼伯恩 (Sonneborn-Berger) — 击败对手的积分加权
              <button type="button" onclick="moveTieBreaker('tbSonneborn', -1)" class="outline secondary" style="font-size:0.7rem; padding:0.1rem 0.4rem;">↑</button>
              <button type="button" onclick="moveTieBreaker('tbSonneborn', 1)" class="outline secondary" style="font-size:0.7rem; padding:0.1rem 0.4rem;">↓</button>
            </label>
            <label>
              <input type="checkbox" id="tbProgressive">
              <span style="font-weight:bold; margin-left:0.3rem;">⑤</span>
              累进分 (Progressive) — 每轮结束时的积分累加
              <button type="button" onclick="moveTieBreaker('tbProgressive', -1)" class="outline secondary" style="font-size:0.7rem; padding:0.1rem 0.4rem;">↑</button>
              <button type="button" onclick="moveTieBreaker('tbProgressive', 1)" class="outline secondary" style="font-size:0.7rem; padding:0.1rem 0.4rem;">↓</button>
            </label>
          </fieldset>
          <div id="createError" style="color:#dc2626; font-size:0.9rem; margin-top:0.5rem; display:none;"></div>
          <button type="submit" id="createBtn" style="width:100%; margin-top:1rem;">创建比赛</button>
        </form>
      </article>

      <!-- 右侧：已有比赛 -->
      <article>
        <header>
          <h3>📋 管理已有比赛</h3>
          <p style="color:var(--pico-muted-color);">在此浏览器上管理过的比赛会自动保存</p>
        </header>
        <div style="margin-bottom:1rem; display:flex; gap:0.5rem; flex-wrap:wrap;">
          <input type="text" id="searchInput" placeholder="🔍 搜索比赛名称..." style="flex:1; min-width:200px;">
          <select id="statusFilter" style="min-width:140px;">
            <option value="">全部状态</option>
            <option value="SETUP">🔧 准备中</option>
            <option value="PAIRING_PUBLISHED">♟️ 对战中</option>
            <option value="FINISHED">🏆 已结束</option>
          </select>
        </div>
        <div class="saved-list" id="savedList">
          <p style="color:var(--pico-muted-color); font-size:0.9rem;">暂无保存的比赛。创建新比赛后会自动出现在这里。</p>
        </div>
        <footer style="text-align:center;">
          <p style="font-size:0.85rem; color:var(--pico-muted-color);">
            💡 学生看板地址：<code>match.html?id=比赛ID</code>
          </p>
        </footer>
      </article>
    </div>
  </main>

  <div class="site-footer">© 2026 华联中学 · Hua Lian High School</div>

  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script>
    // ── 实时统计输入人数 ──
    document.getElementById('playerInput').addEventListener('input', function() {
      const lines = this.value.trim().split('\n').filter(l => l.trim());
      document.getElementById('playerCountPreview').textContent = lines.length;
    });

    // ── 防抖函数 ──
    let debounceTimer;
    function debounce(func, wait) {
      return function(...args) {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => func.apply(this, args), wait);
      };
    }

    // ── 加载已保存的比赛（通过 API） ──
    async function loadSaved() {
      const search = document.getElementById('searchInput').value.trim();
      const status = document.getElementById('statusFilter').value;

      try {
        const list = await getTournaments(search, status);
        const container = document.getElementById('savedList');

        if (!list || list.length === 0) {
          const emptyText = search || status ? '没有匹配的比赛' : '暂无保存的比赛。创建新比赛后会自动出现在这里。';
          container.innerHTML = `<p style="color:var(--pico-muted-color); font-size:0.9rem;">${emptyText}</p>`;
          return;
        }

        container.innerHTML = list.map(t => {
          const statusLabel = t.status ? STATUS_LABELS[t.status] : '-';
          const isDeleted = t.deleted_at !== undefined && t.deleted_at !== null;
          return `
          <div class="saved-item" style="${isDeleted ? 'opacity:0.5;' : ''}">
            <div>
              <a href="admin.html?id=${escHtml(t.id)}" style="${isDeleted ? 'text-decoration:line-through;' : ''}">${escHtml(t.name)}</a>
              <span style="color:var(--pico-muted-color); font-size:0.8rem; margin-left:0.5rem;">${escHtml(t.id.slice(0,8))}...</span>
              <span style="color:var(--pico-muted-color); font-size:0.8rem; margin-left:0.5rem;">${statusLabel}</span>
              ${isDeleted ? '<span style="color:#dc2626; font-size:0.75rem; margin-left:0.5rem;">(已删除)</span>' : ''}
            </div>
            <div style="display:flex; align-items:center; gap:0.5rem;">
              ${isDeleted
                ? `<button onclick="handleRestoreSaved('${escHtml(t.id)}','${escHtml(t.name)}')" class="outline secondary" style="font-size:0.75rem; padding:0.15rem 0.4rem; color:#16a34a; border-color:#16a34a;" title="恢复此比赛">↩ 恢复</button>`
                : `<a href="match.html?id=${escHtml(t.id)}" class="badge" style="text-decoration:none;">📱 学生看板</a>`
              }
              <button onclick="handleDeleteSaved('${escHtml(t.id)}','${escHtml(t.name)}')" class="outline secondary" style="font-size:0.75rem; padding:0.15rem 0.4rem; color:#dc2626; border-color:#dc2626;" title="删除此比赛">🗑</button>
            </div>
          </div>`;
        }).join('');
      } catch (err) {
        document.getElementById('savedList').innerHTML = `<p style="color:#dc2626; font-size:0.9rem;">加载失败: ${err.message}</p>`;
      }
    }

    // ── 监听搜索框（防抖 300ms） ──
    document.getElementById('searchInput').addEventListener('input', debounce(loadSaved, 300));

    // ── 监听状态筛选 ──
    document.getElementById('statusFilter').addEventListener('change', loadSaved);

    // ── 渲染已保存的比赛（兼容旧版） ──
    function renderSaved() {
      const list = getSavedTournaments();
      const container = document.getElementById('savedList');
      if (list.length === 0) {
        container.innerHTML = '<p style="color:var(--pico-muted-color); font-size:0.9rem;">暂无保存的比赛。</p>';
        return;
      }
      container.innerHTML = list.map(t => `
        <div class="saved-item">
          <div>
            <a href="admin.html?id=${escHtml(t.id)}">${escHtml(t.name)}</a>
            <span style="color:var(--pico-muted-color); font-size:0.8rem; margin-left:0.5rem;">${escHtml(t.id.slice(0,8))}...</span>
          </div>
          <div style="display:flex; align-items:center; gap:0.5rem;">
            <a href="match.html?id=${escHtml(t.id)}" class="badge" style="text-decoration:none;">学生看板</a>
            <button onclick="handleDeleteSaved('${escHtml(t.id)}','${escHtml(t.name)}')" class="outline secondary" style="font-size:0.75rem; padding:0.15rem 0.4rem; color:#dc2626; border-color:#dc2626;" title="删除此比赛">🗑</button>
          </div>
        </div>
      `).join('');
    }

    // ── 删除已保存的比赛 ──
    async function handleDeleteSaved(tournamentId, tournamentName) {
      if (!confirm('⚠️ 确定要删除比赛「' + tournamentName + '」吗？\n\n此操作不可恢复，将同时删除所有选手和对战记录。')) return;

      // 先从已保存列表恢复 token（删除失败时仍需要 token 访问其他操作）
      const saved = getSavedTournaments().find(t => t.id === tournamentId);
      if (saved && saved.token) {
        setToken(tournamentId, saved.token);
      }

      // 尝试从服务器删除
      let apiSuccess = false;
      try {
        await deleteTournament(tournamentId);
        apiSuccess = true;
        console.log('API 删除成功:', tournamentId);
      } catch (err) {
        console.warn('API 删除失败（可能已不存在）:', err.message);
      }

      // 只有删除成功后才清除本地 token
      if (apiSuccess) {
        clearToken(tournamentId);
      }

      // 从本地列表移除
      const list = getSavedTournaments().filter(t => t.id !== tournamentId);
      localStorage.setItem('chess_tournaments', JSON.stringify(list));

      // 重新加载（从 API 获取最新状态）
      await loadSaved();

      if (apiSuccess) {
        alert('✅ 已删除「' + tournamentName + '」\n（本地记录已清除）');
      } else {
        alert('⚠️ 服务器删除失败，本地记录已清除\n但数据可能仍存在于服务器');
      }
    }

    // ── 恢复已删除的比赛 ──
    async function handleRestoreSaved(tournamentId, tournamentName) {
      if (!confirm('⚠️ 确定要恢复比赛「' + tournamentName + '」吗？\n\n恢复后将重新显示在首页。')) return;

      try {
        await restoreTournament(tournamentId);
        await loadSaved(); // 重新加载列表
        alert('✅ 已恢复「' + tournamentName + '」');
      } catch (err) {
        alert('恢复失败: ' + err.message);
      }
    }

    // ── 破同分规则排序（上下箭头） ──
    const TIEBREAKER_IDS = ['tbBuchholz', 'tbMedian', 'tbDirect', 'tbSonneborn', 'tbProgressive'];

    /**
     * 移动破同分规则顺序
     * @param {string} checkboxId - checkbox 的 ID
     * @param {number} direction - -1 上移, 1 下移
     */
    function moveTieBreaker(checkboxId, direction) {
      const idx = TIEBREAKER_IDS.indexOf(checkboxId);
      if (idx === -1) return;

      const newIdx = idx + direction;
      // 边界检查：不超出数组边界
      if (newIdx < 0 || newIdx >= TIEBREAKER_IDS.length) return;

      // 交换位置
      [TIEBREAKER_IDS[idx], TIEBREAKER_IDS[newIdx]] = [TIEBREAKER_IDS[newIdx], TIEBREAKER_IDS[idx]];

      // 更新 DOM 序号显示
      updateTiebreakerNumbers();
    }

    /**
     * 更新破同分规则的序号显示
     */
    function updateTiebreakerNumbers() {
      TIEBREAKER_IDS.forEach((id, index) => {
        const checkbox = document.getElementById(id);
        const numberSpan = checkbox.nextElementSibling; // 假设序号是 checkbox 的下一个 sibling
        if (numberSpan && numberSpan.tagName === 'SPAN') {
          numberSpan.textContent = (index + 1) + ' ';
        }
      });
    }

    // 页面加载时初始化序号
    updateTiebreakerNumbers();

    // ── 创建比赛 ──
    async function handleCreate(e) {
      e.preventDefault();
      const name = document.getElementById('tName').value.trim();
      const rounds = parseInt(document.getElementById('tRounds').value);
      const playerRaw = document.getElementById('playerInput').value.trim();

      // 收集破同分规则（按当前 TIEBREAKER_IDS 顺序）
      const tieBreakers = TIEBREAKER_IDS
        .filter(id => document.getElementById(id).checked)
        .map(id => {
          if (id === 'tbBuchholz') return 'buchholz';
          if (id === 'tbMedian') return 'median';
          if (id === 'tbDirect') return 'direct';
          if (id === 'tbSonneborn') return 'sonneborn';
          if (id === 'tbProgressive') return 'progressive';
        })
        .filter(Boolean); // 移除 undefined（未勾选的规则）

      const btn = document.getElementById('createBtn');
      const errEl = document.getElementById('createError');

      if (!name) { showError(errEl, '请输入比赛名称'); return; }
      hideError(errEl);
      btn.disabled = true;
      btn.textContent = '创建中...';

      try {
        const t = await createTournament(name, rounds, tieBreakers);
        setToken(t.id, t.admin_token);
        saveTournament(t.id, t.name, t.admin_token);

        // 如果首页填了选手名单，直接导入
        if (playerRaw) {
          const lines = playerRaw.split('\n').filter(l => l.trim());
          const players = lines.map(l => {
            const parts = l.split(/[,，]/);
            return { name: parts[0].trim(), grade: (parts[1] || '').trim() };
          }).filter(p => p.name);

          if (players.length > 0) {
            btn.textContent = '导入选手中...';
            await importPlayers(t.id, players);
          }
        }

        window.location.href = 'admin.html?id=' + t.id;
      } catch (err) {
        showError(errEl, err.message);
        btn.disabled = false;
        btn.textContent = '创建比赛';
      }
    }

    // 页面加载时初始化
    loadSaved();
  </script>
</body>
</html>
